services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scribe-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # host:container — expose local Postgres on 5432 so the backend (running on the host) can reach it.
      - "5432:5432"
    volumes:
      # named volume: data persists across container restarts / recreation.
      - scribe-pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready returns success only once Postgres can actually accept connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  scribe-pgdata:
